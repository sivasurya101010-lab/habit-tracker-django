{% extends 'base.html' %}
{% block content %}

<div class="history-container">

    <h1 class="history-title">
        📂 My Categories
    </h1>

    <a href="{% url 'category' %}" class="add-btn">
        + Add Category
    </a>

    <br><br>

    <table class="history-table">

        <thead>
            <tr>
                <th>Category Name</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            {% for category in categories %}

            <tr>

                <td>
                    {{ category.name }}
                </td>

                <td>

                    <a href="{% url 'update_category' category.id %}">
                        <button type="button" class="update-btn">
                            Update
                        </button>
                    </a>

                    <form action="{% url 'delete_category' category.id %}"
                          method="post"
                          style="display:inline;">

                        {% csrf_token %}

                        <button type="submit"
                                class="delete-btn">
                            Delete
                        </button>

                    </form>

                </td>

            </tr>

            {% empty %}

            <tr>
                <td colspan="2">
                    No Categories Found
                </td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

    <br>

    <a href="{% url 'home' %}"
       class="back-btn">
       ← Back to Dashboard
    </a>

</div>

{% endblock %}

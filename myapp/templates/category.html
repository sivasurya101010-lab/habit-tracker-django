{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h1 class="page-title">
        Add Category
    </h1>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="submit-btn">
            Add Category
        </button>

    </form>

    <a href="{% url 'home' %}"
       class="back-link">
        ← Back to Home
    </a>

</div>

{% endblock %}
